# ==============================================================================
# Plato Generic Template Configuration Example (plato.toml)
#
# Save this file as plato.toml in a template directory for a language-neutral
# template. This example contains the generic template, rendering, path rewrite,
# and Git settings.
# ==============================================================================

[plato]
# Generic templates only receive the built-in project_* name values plus any
# values configured under [template.context].
#
# Supported options: "base" (default), "python"/"py", "rust"/"rs"
template_language = "base"

# If true, Plato runs git init after rendering and applies the [git.*] settings.
setup_git = false


# ------------------------------------------------------------------------------
# Git Initialization
# ------------------------------------------------------------------------------
[git]
# If unset, Plato runs plain `git init` and Git uses the user's global defaults.
initial_branch = "main"

[git.user]
# Local repository identity written with `git config --local` when setup_git=true.
name = "Jane Doe"
email = "jane@example.com"
signing_key = "ABC123DEF456"

[git.commit]
# Configure local commit signing and optionally create the first commit.
gpgsign = true
initial = false
initial_message = "Initial commit"

[git.core]
# Local repository core settings. Remove keys you want Git to inherit globally.
hooks_path = ".githooks"
autocrlf = "input"        # true | false | input
eol = "lf"                # lf | crlf | native
filemode = true


# ------------------------------------------------------------------------------
# Template Rendering Context
# ------------------------------------------------------------------------------
[template.context]
# Arbitrary string key-value pairs available to path and file content templates.
# Built-in generic keys include:
# - project_name
# - project_kebab
# - project_snake
# - project_pascal
description = "Generated with Plato"
license = "MIT"


# ------------------------------------------------------------------------------
# Path Rewrites
# ------------------------------------------------------------------------------
[path.replace]
# Named path rewrite rules. `path` must exactly match a relative path in the
# template source tree. `replace` is rendered with MiniJinja before writing.
#
# Example: template directory `project-template/` becomes `{{ project_kebab }}/`.
project = { path = "project-template", replace = "{{ project_kebab }}" }
