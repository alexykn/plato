# ==============================================================================
# Plato Global Configuration Example (config.toml)
#
# Save this file as ~/.config/plato/config.toml to configure named templates,
# remote Git provider defaults, optional template config overrides, and explicit
# plugin registry entries.
# ==============================================================================

[plato]
# The default Git provider to use when parsing shorthand Git specs such as
# "owner/repo" with no provider or host prefix.
#
# Supported options: "github" (default), "gitlab", "bitbucket"
default_git_provider = "github"


# ------------------------------------------------------------------------------
# Git Provider Custom Host Overrides
# ------------------------------------------------------------------------------
[plato.git_hosts]
# Override built-in provider domains to point at private/self-hosted instances.
#
# Default values used when not configured:
# - github: "github.com"
# - gitlab: "gitlab.com"
# - bitbucket: "bitbucket.org"
#
# Examples:
github = "github.company.test"
gitlab = "gitlab.company.test"
bitbucket = "bitbucket.company.test"


# ------------------------------------------------------------------------------
# Configured Templates Registry
# ------------------------------------------------------------------------------
# Template names are explicit. Directory names are not discovered as templates.
# When configured here, you can run: `plato init <name> <project_name>`.
[templates]

# Local path template. Tilde expansion (~) is supported.
python312 = { path = "~/.config/plato/templates/python312" }

# Provider remote Git template. Provider shorthand normalizes to an SSH remote.
# Example below resolves to git@gitlab.company.test:development/api-boilerplate.git
team_api = { git = "gitlab:development/api-boilerplate" }

# Remote Git template pinned to a revision and nested subdirectory.
axum_service = { git = "github:rust-guild/microservices-monorepo", rev = "v2.1.0", subpath = "templates/axum-service" }

# Custom SSH Git remote.
custom_git = { git = "git@git.company.test:templates/rust-base.git", rev = "main" }


# ------------------------------------------------------------------------------
# Template Configuration Overrides
# ------------------------------------------------------------------------------
# Optional external plato.toml files for configured templates.
#
# Overrides win over source-local plato.toml files. This is useful for remote
# templates whose repository should not contain your local/private config.
[template_configs]
team_api = "~/.config/plato/template_configs/team_api.toml"
axum_service = "~/.config/plato/template_configs/axum_service.toml"


# ------------------------------------------------------------------------------
# Explicit Plugin Registry
# ------------------------------------------------------------------------------
# Usually you do not need this: Plato discovers plugins installed into its
# managed plugin directory and plugins available on PATH.
#
# Use plugin_registry only when a plugin lives at a custom path or you want to
# force a specific executable for a plugin name.
[plugin_registry.uv]
command = "~/.config/plato/plugins/bin/plato-plugin-uv"
source = "cargo:plato-plugin-uv"

[plugin_registry.custom]
command = "/opt/plato/plugins/plato-plugin-custom"
source = "manual"
