# ==============================================================================
# Plato Rust Template Configuration Example (plato.toml)
#
# Save this file as plato.toml in a Rust template directory. This example
# contains every Rust-specific template setting plus the shared rendering,
# path rewrite, and Git settings.
# ==============================================================================

[plato]
# Rust templates receive generic project_* values and Rust-specific derived
# values such as rust_package_name, rust_crate_name, and rust_binary_name.
#
# Supported options: "rust" or "rs"
template_language = "rust"

# If true, Plato runs git init after rendering and applies the [git.*] settings.
setup_git = false


# ------------------------------------------------------------------------------
# Git Initialization
# ------------------------------------------------------------------------------
[git]
# If unset, Plato runs plain `git init` and Git uses the user's global defaults.
initial_branch = "main"

[git.user]
# Local repository identity written with `git config --local` when setup_git=true.
name = "Jane Doe"
email = "jane@example.com"
signing_key = "ABC123DEF456"

[git.commit]
# Configure local commit signing and optionally create the first commit.
gpgsign = true
initial = false
initial_message = "Initial commit"

[git.core]
# Local repository core settings. Remove keys you want Git to inherit globally.
hooks_path = ".githooks"
autocrlf = "input"        # true | false | input
eol = "lf"                # lf | crlf | native
filemode = true


# ------------------------------------------------------------------------------
# Template Rendering Context
# ------------------------------------------------------------------------------
[template.context]
# Arbitrary string key-value pairs available to path and file content templates.
description = "Generated with Plato"
license = "MIT"


# ------------------------------------------------------------------------------
# Path Rewrites
# ------------------------------------------------------------------------------
[path.replace]
# Named path rewrite rules. `path` must exactly match a relative path in the
# template source tree. `replace` is rendered with MiniJinja before writing.
crate_dir = { path = "crate-template", replace = "{{ rust_package_name }}" }


# ------------------------------------------------------------------------------
# Rust Setup
# ------------------------------------------------------------------------------
[rust]
# Rust toolchain installed with rustup and passed to Cargo commands, e.g.
# `cargo +stable build`.
toolchain = "stable"

# Optional rustup setup before Cargo commands.
components = ["rustfmt", "clippy"]
targets = []

# Supported options: base | fetch | build
project_scope = "base"

# Supported options: binary | bin | library | lib
project_type = "binary"

# If true, Plato may run cargo init for templates that do not already contain a
# Cargo project. Leave false when the template owns Cargo.toml and src layout.
cargo_init = false
